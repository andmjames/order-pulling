<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />

    <!-- iOS home-screen app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Order Pulling" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <!-- Favicons / PWA -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Order Pulling — PMI Tape</title>

    <!-- Prevent pinch / double-tap zoom (iOS Safari ignores user-scalable=no on its own). -->
    <script>
      document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
      document.addEventListener('gestureend', function (e) { e.preventDefault(); });
      // Block multi-touch pinch zoom.
      document.addEventListener('touchmove', function (e) {
        if (e.touches && e.touches.length > 1) e.preventDefault();
      }, { passive: false });
      // Block double-tap-to-zoom.
      var lastTouchEnd = 0;
      document.addEventListener('touchend', function (e) {
        var now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
